name: Validate historical GIS data

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Validate GeoJSON and provenance
        run: python3 scripts/validate_geojson.py
      - name: Smoke test manifests
        run: python3 scripts/smoke_test.py
      - name: Test period discovery utilities
        run: node scripts/test_period_utils.mjs
      - name: Test overlay loading lifecycle
        run: node scripts/test_overlay_loading_contract.mjs
      - name: Check JavaScript syntax
        run: |
          node --check assets/period-utils.js
          node --check assets/app.js
          node --check assets/app-core.js
          node --check assets/app-periods.js
          node --check assets/app-map.js
          node --check assets/app-init.js
          node --check netlify/functions/noaa-aerial-catalog.mjs
