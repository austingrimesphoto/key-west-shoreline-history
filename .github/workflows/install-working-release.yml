name: Install working historical GIS release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Expand working release outside repository
        shell: bash
        run: |
          set -euo pipefail
          test -s .bootstrap/project-v2.tar.gz.b64
          base64 --decode .bootstrap/project-v2.tar.gz.b64 > /tmp/key-west-working-release.tar.gz
          tar -tzf /tmp/key-west-working-release.tar.gz >/dev/null
          rm -rf /tmp/key-west-working-release
          mkdir -p /tmp/key-west-working-release
          tar -xzf /tmp/key-west-working-release.tar.gz -C /tmp/key-west-working-release
      - name: Copy application without workflow files
        shell: bash
        run: |
          set -euo pipefail
          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.bootstrap/' \
            /tmp/key-west-working-release/ ./
          rm -rf .bootstrap
          git status --short
      - name: Commit working release
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- . ':(exclude).github/workflows/**'
          git status --short
          if git diff --cached --quiet; then
            echo "No application changes to commit."
            exit 0
          fi
          git commit -m "Install working Key West historical GIS release"
          git push
