name: Install working historical GIS release

on:
  workflow_dispatch:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  install:
    if: github.event_name == 'workflow_dispatch' || github.event.issue.title == 'Install working historical GIS release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Expand corrected release
        run: |
          base64 --decode .bootstrap/project-v2.tar.gz.b64 > /tmp/key-west-working-release.tar.gz
          tar -xzf /tmp/key-west-working-release.tar.gz -C .
          rm -rf .bootstrap
          rm -f .github/workflows/install-working-release.yml
      - name: Commit working release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Install working Key West historical GIS release"
          git push
      - name: Close trigger issue
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --comment "Working historical GIS release installed."
