name: Install working historical GIS release

on:
  workflow_dispatch:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  install:
    if: github.event_name == 'workflow_dispatch' || github.event.issue.title == 'Install working historical GIS release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Expand corrected release
        shell: bash
        run: |
          set -euo pipefail
          test -s .bootstrap/project-v2.tar.gz.b64
          base64 --decode .bootstrap/project-v2.tar.gz.b64 > /tmp/key-west-working-release.tar.gz
          tar -tzf /tmp/key-west-working-release.tar.gz >/dev/null
          tar -xzf /tmp/key-west-working-release.tar.gz -C .
          rm -rf .bootstrap
          rm -rf .github/workflows
          mkdir -p .github/workflows
      - name: Commit working release
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git status --short
          git commit -m "Install working Key West historical GIS release"
          git push
      - name: Close trigger issue
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --comment "Working historical GIS release installed."
