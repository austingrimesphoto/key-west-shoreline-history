name: Install working historical GIS release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Expand working release
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode .bootstrap/project-v2.tar.gz.b64 > /tmp/key-west-working-release.tar.gz
          tar -tzf /tmp/key-west-working-release.tar.gz >/dev/null
          tar -xzf /tmp/key-west-working-release.tar.gz -C .
          rm -rf .bootstrap
          rm -f .github/workflows/validate.yml
      - name: Commit working release
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --stat
          git commit -m "Install working Key West historical GIS release"
          git push
